<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Évaluation financière</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            calm: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
            warm: { 50: '#fefce8', 100: '#fef9c3', 500: '#eab308' },
            ocean: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            soft: { 50: '#faf5ff', 100: '#f3e8ff', 500: '#a855f7' },
            slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useMemo, useEffect } = React;

    // ─── Data ──────────────────────────────────────────────────────
    const FIXED_EXPENSE_CATS = [
      { key: 'loyer_hypotheque', label: 'Loyer ou hypotheque' },
      { key: 'taxes_foncieres', label: 'Taxes foncieres' },
      { key: 'electricite', label: 'Electricite / chauffage' },
      { key: 'internet_cell', label: 'Internet / cellulaire' },
      { key: 'assurances', label: 'Assurances (auto, habitation, etc.)' },
      { key: 'transport', label: 'Transport (paiement auto, transport en commun, essence)' },
      { key: 'soins_sante', label: 'Traitements / soins de sante reguliers' },
      { key: 'abonnements', label: 'Abonnements (streaming, gym, etc.)' },
    ];

    const VARIABLE_CATS = [
      { key: 'epicerie', label: 'Epicerie', opts: ['Moins de 200$', '200-400$', '400-600$', '600$+', 'Je ne sais pas'] },
      { key: 'restaurants', label: 'Restaurants / take-out / livraison', opts: ['Moins de 50$', '50-150$', '150-300$', '300$+', 'Je ne sais pas'] },
      { key: 'vetements', label: 'Vetements / accessoires', opts: ['Presque rien', 'Moins de 100$', '100-300$', '300$+', 'Je ne sais pas'] },
      { key: 'soins_perso', label: 'Soins personnels (coiffure, esthetique, etc.)', opts: ['Moins de 50$', '50-150$', '150-300$', '300$+', 'Je ne sais pas'] },
      { key: 'sorties', label: 'Sorties / divertissement', opts: ['Moins de 50$', '50-150$', '150-300$', '300$+', 'Je ne sais pas'] },
      { key: 'cadeaux', label: 'Cadeaux', opts: ['Rarement', 'Moins de 50$', '50-150$', '150$+', 'Je ne sais pas'] },
      { key: 'achats_en_ligne', label: 'Achats en ligne (Amazon, etc.)', opts: ['Rarement', 'Moins de 100$', '100-300$', '300$+', 'Je ne sais pas'] },
    ];

    const DEBT_TYPES = ['Ligne de credit', 'Carte de credit', 'Pret personnel', 'Pret auto', 'Autre'];

    const DECLENCHEURS = [
      'Quand je suis stressee ou fatiguee',
      'Quand je suis avec des amis',
      'Les achats en ligne le soir',
      'Les aubaines / promotions',
      "L'epicerie (j'achete plus que prevu)",
      'Les restos / sorties',
    ];

    const RAISONS_ECHEC = [
      "C'etait trop complique",
      "J'oubliais de noter mes depenses",
      "C'etait deprimant de voir les chiffres",
      'La vie a pris le dessus',
      "L'outil que j'utilisais me convenait pas",
    ];

    // ─── Reusable Components ───────────────────────────────────────
    function ProgressBar({ current, total }) {
      const pct = Math.round((current / total) * 100);
      return (
        <div className="sticky top-0 z-10 bg-white/90 backdrop-blur-sm border-b border-slate-200 px-4 py-3">
          <div className="flex justify-between items-center mb-1.5">
            <span className="text-sm font-medium text-slate-600">{`Etape ${current} de ${total}`}</span>
            <span className="text-sm text-slate-400">{pct}%</span>
          </div>
          <div className="w-full bg-slate-200 rounded-full h-2">
            <div className="bg-ocean-500 h-2 rounded-full transition-all duration-500 ease-out" style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function BlockIntro({ text }) {
      return <p className="text-slate-600 text-base leading-relaxed mb-6 italic">{text}</p>;
    }

    function Question({ text, children }) {
      return (
        <div className="mb-5">
          <p className="text-slate-800 text-lg font-medium leading-snug mb-4">{text}</p>
          {children}
        </div>
      );
    }

    function Chip({ label, selected, onClick }) {
      return (
        <button
          type="button"
          onClick={onClick}
          className={`w-full text-left px-4 py-3.5 rounded-xl border-2 text-base transition-all duration-150 min-h-[44px]
            ${selected
              ? 'border-ocean-500 bg-ocean-50 text-ocean-700 font-medium'
              : 'border-slate-200 bg-white text-slate-700 hover:border-slate-300 active:bg-slate-50'}`}
        >
          {label}
        </button>
      );
    }

    function ChipGroup({ options, value, onChange }) {
      return (
        <div className="flex flex-col gap-2.5">
          {options.map(opt => (
            <Chip key={opt} label={opt} selected={value === opt} onClick={() => onChange(opt)} />
          ))}
        </div>
      );
    }

    function MultiChipGroup({ options, values = [], onChange }) {
      const toggle = (opt) => {
        if (values.includes(opt)) onChange(values.filter(v => v !== opt));
        else onChange([...values, opt]);
      };
      return (
        <div className="flex flex-col gap-2.5">
          {options.map(opt => (
            <Chip key={opt} label={opt} selected={values.includes(opt)} onClick={() => toggle(opt)} />
          ))}
        </div>
      );
    }

    function TextInput({ value, onChange, placeholder, multiline }) {
      const cls = "w-full px-4 py-3 rounded-xl border-2 border-slate-200 text-base text-slate-800 placeholder-slate-400 focus:border-ocean-500 focus:outline-none transition-colors bg-white min-h-[44px]";
      if (multiline) return <textarea className={cls + " min-h-[120px] resize-y"} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} />;
      return <input type="text" className={cls} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} />;
    }

    function NumberInput({ value, onChange, placeholder }) {
      return (
        <input
          type="number"
          inputMode="numeric"
          pattern="[0-9]*"
          className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 text-base text-slate-800 placeholder-slate-400 focus:border-ocean-500 focus:outline-none transition-colors bg-white min-h-[44px]"
          value={value === null || value === undefined ? '' : value}
          onChange={e => onChange(e.target.value === '' ? null : Number(e.target.value))}
          placeholder={placeholder || '0$'}
        />
      );
    }

    function NavButtons({ onBack, onNext, backLabel, nextLabel, nextDisabled }) {
      return (
        <div className="flex gap-3 mt-8">
          {onBack && (
            <button type="button" onClick={onBack}
              className="flex-1 px-4 py-3.5 rounded-xl border-2 border-slate-200 text-slate-600 font-medium text-base bg-white active:bg-slate-50 min-h-[44px]">
              {backLabel || 'Retour'}
            </button>
          )}
          <button type="button" onClick={onNext} disabled={nextDisabled}
            className={`flex-1 px-4 py-3.5 rounded-xl font-medium text-base min-h-[44px] transition-colors
              ${nextDisabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-ocean-600 text-white active:bg-ocean-700'}`}>
            {nextLabel || 'Continuer'}
          </button>
        </div>
      );
    }

    // ─── Main App ──────────────────────────────────────────────────
    function App() {
      const startTime = useRef(Date.now());
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({
        revenu: null,
        stabilite: null,
        logement: null,
        depenses_fixes: {},
        depenses_fixes_autre_label: '',
        depenses_fixes_autre_montant: null,
        depenses_fixes_na: {},
        depenses_fixes_notes: '',
        taxes_foncieres_annuel: false,
        nombre_dettes: null,
        dettes: [],
        sentiment_dettes: null,
        sentiment_dettes_autre: '',
        variables: {},
        declencheurs: [],
        declencheurs_autre: '',
        suivi_actuel: null,
        suivi_actuel_autre: '',
        app_details: '',
        budget_tente: null,
        raisons_echec: [],
        raisons_echec_autre: '',
        objectif_libre: '',
        priorite: null,
        priorite_autre: '',
        horizon: null,
        frequence_saisie: null,
        affichage: null,
        notifications: null,
        confidentialite: null,
        question_ouverte: '',
        question_ouverte_skip: false,
      });

      const [copyMsg, setCopyMsg] = useState('');
      const containerRef = useRef(null);

      const set = useCallback((key, val) => {
        setAnswers(prev => ({ ...prev, [key]: val }));
      }, []);

      const setNested = useCallback((group, key, val) => {
        setAnswers(prev => ({ ...prev, [group]: { ...prev[group], [key]: val } }));
      }, []);

      // Scroll to top on step change
      useEffect(() => {
        if (containerRef.current) containerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [step]);

      // Debt count helper
      const debtCount = useMemo(() => {
        const map = { 'Aucune': 0, '1': 1, '2': 2, '3': 3, '4 ou plus': 4 };
        return map[answers.nombre_dettes] ?? 0;
      }, [answers.nombre_dettes]);

      // Ensure debts array matches count
      useEffect(() => {
        if (debtCount > answers.dettes.length) {
          const newDebts = [...answers.dettes];
          while (newDebts.length < debtCount) {
            newDebts.push({ type: null, solde: null, paiement_min: null, taux: null, taux_inconnu: false });
          }
          set('dettes', newDebts);
        }
      }, [debtCount]);

      const setDebt = (idx, key, val) => {
        setAnswers(prev => {
          const d = [...prev.dettes];
          d[idx] = { ...d[idx], [key]: val };
          return { ...prev, dettes: d };
        });
      };

      // Fixed expenses subtotal
      const fixedTotal = useMemo(() => {
        let total = 0;
        Object.entries(answers.depenses_fixes).forEach(([, v]) => { if (v) total += v; });
        if (answers.depenses_fixes_autre_montant) total += answers.depenses_fixes_autre_montant;
        // Adjust taxes foncieres if annual
        if (answers.taxes_foncieres_annuel && answers.depenses_fixes.taxes_foncieres) {
          total -= answers.depenses_fixes.taxes_foncieres;
          total += Math.round(answers.depenses_fixes.taxes_foncieres / 12);
        }
        return total;
      }, [answers.depenses_fixes, answers.depenses_fixes_autre_montant, answers.taxes_foncieres_annuel]);

      // Step definitions — each step knows its block (1-8 for progress), condition, and render
      // STEP MAP:
      // 0: Welcome
      // 1: Block1 intro + Q1.1
      // 2: Q1.2
      // 3: Q1.3
      // 4: Block2 intro + Q2.1
      // 5: Q2.2
      // 6: Block3 intro + Q3.1
      // 7: Q3.2 debt 1
      // 8: Q3.2 debt 2
      // 9: Q3.2 debt 3
      // 10: Q3.2 debt 4
      // 11: Q3.3
      // 12: Block4 intro + Q4.1
      // 13: Q4.2
      // 14: Block5 intro + Q5.1
      // 15: Q5.2 (conditional)
      // 16: Q5.3
      // 17: Q5.4 (conditional)
      // 18: Block6 intro + Q6.1
      // 19: Q6.2
      // 20: Q6.3
      // 21: Block7 intro + Q7.1
      // 22: Q7.2
      // 23: Q7.3
      // 24: Q7.4
      // 25: Block8 intro + Q8.1
      // 26: End

      const TOTAL_BLOCKS = 8;

      const stepBlock = (s) => {
        if (s <= 0) return 0;
        if (s <= 3) return 1;
        if (s <= 5) return 2;
        if (s <= 11) return 3;
        if (s <= 13) return 4;
        if (s <= 17) return 5;
        if (s <= 20) return 6;
        if (s <= 24) return 7;
        if (s <= 25) return 8;
        return 9;
      };

      const shouldShow = (s) => {
        // Debt detail steps — only show if enough debts
        if (s === 7) return debtCount >= 1;
        if (s === 8) return debtCount >= 2;
        if (s === 9) return debtCount >= 3;
        if (s === 10) return debtCount >= 4;
        // Q3.3 only if debts > 0
        if (s === 11) return debtCount > 0;
        // Q5.2 only if app selected
        if (s === 15) return answers.suivi_actuel === "J'utilise une app";
        // Q5.4 only if budget attempted
        if (s === 17) return answers.budget_tente && answers.budget_tente !== 'Non, jamais';
        return true;
      };

      const goNext = () => {
        let next = step + 1;
        while (next <= 26 && !shouldShow(next)) next++;
        setStep(Math.min(next, 26));
      };

      const goBack = () => {
        let prev = step - 1;
        while (prev >= 0 && !shouldShow(prev)) prev--;
        setStep(Math.max(prev, 0));
      };

      // ─── Export helpers ────────────────────────────────────────
      const buildJSON = () => {
        const duration = Math.round((Date.now() - startTime.current) / 60000);
        const now = new Date().toISOString();

        const revenuMap = {
          'Moins de 2 500$': 'moins_2500',
          '2 500$ - 3 500$': '2500-3500',
          '3 500$ - 4 500$': '3500-4500',
          '4 500$ - 5 500$': '4500-5500',
          'Plus de 5 500$': 'plus_5500',
          'Je prefere ne pas repondre': 'non_divulgue',
        };

        const stabiliteMap = {
          'Oui, c\'est regulier (salaire fixe)': 'regulier',
          'Ca varie un peu': 'varie_peu',
          'Ca varie beaucoup': 'varie_beaucoup',
          'Je ne suis pas sure': 'incertain',
        };

        const logementMap = {
          'Proprietaire': 'proprietaire',
          'Locataire': 'locataire',
          'Autre situation': 'autre',
        };

        const fixedItems = [];
        FIXED_EXPENSE_CATS.forEach(cat => {
          let montant = answers.depenses_fixes[cat.key];
          if (montant) {
            if (cat.key === 'taxes_foncieres' && answers.taxes_foncieres_annuel) {
              montant = Math.round(montant / 12);
            }
            fixedItems.push({ categorie: cat.key, montant_mensuel: montant });
          }
        });
        if (answers.depenses_fixes_autre_montant) {
          fixedItems.push({ categorie: answers.depenses_fixes_autre_label || 'autre', montant_mensuel: answers.depenses_fixes_autre_montant });
        }

        const debtItems = answers.dettes.slice(0, debtCount).map(d => ({
          type: d.type ? d.type.toLowerCase().replace(/ /g, '_').replace(/é/g, 'e') : null,
          solde: d.solde,
          paiement_minimum: d.paiement_min,
          taux_interet: d.taux_inconnu ? null : d.taux,
        }));

        const sentimentMap = {
          "C'est gerable, mais je veux m'en debarrasser plus vite": 'gerable',
          'Ca me stresse pas mal': 'stresse',
          'Je me sens depassee': 'depassee',
          "J'y pense pas trop": 'indifferent',
        };

        const variableItems = VARIABLE_CATS.map(cat => ({
          categorie: cat.key,
          fourchette: answers.variables[cat.key] || null,
        })).filter(i => i.fourchette);

        const declSlugMap = {
          'Quand je suis stressee ou fatiguee': 'stress_fatigue',
          'Quand je suis avec des amis': 'amis',
          'Les achats en ligne le soir': 'achats_en_ligne_soir',
          'Les aubaines / promotions': 'aubaines_promos',
          "L'epicerie (j'achete plus que prevu)": 'epicerie_surplus',
          'Les restos / sorties': 'restos_sorties',
        };

        const suiviMap = {
          'Je ne les suis pas vraiment': 'aucun',
          'Je regarde mes releves bancaires de temps en temps': 'releves',
          "J'ai un fichier Excel ou un cahier": 'excel_cahier',
          "J'utilise une app": 'app',
        };

        const budgetMap = {
          'Non, jamais': 'jamais',
          "Oui, mais j'ai lache assez vite": 'oui_lache_vite',
          "Oui, ca a marche un temps mais j'ai arrete": 'oui_arrete',
          "Oui, j'en ai un mais je le respecte pas": 'oui_pas_respecte',
        };

        const prioriteMap = {
          'Rembourser mes dettes': 'rembourser_dettes',
          'Arreter de depasser mon budget': 'arreter_depasser',
          "Me batir un coussin d'urgence": 'coussin_urgence',
          'Reduire mon stress financier': 'reduire_stress',
        };

        const horizonMap = {
          "D'ici 3 mois": '3_mois',
          "D'ici 6 mois": '6_mois',
          "D'ici 1 an": '1_an',
          'Je veux juste que ca aille mieux, pas de deadline': 'pas_deadline',
        };

        const freqMap = {
          'A chaque achat (ou presque)': 'chaque_achat',
          'Une fois par jour, le soir': 'une_fois_par_jour',
          'Quelques fois par semaine': 'quelques_fois_semaine',
          'Une fois par semaine': 'une_fois_semaine',
          'Le moins possible': 'le_moins_possible',
        };

        const affMap = {
          'Des graphiques visuels (barres, cercles, courbes)': 'graphiques',
          'Des chiffres simples et clairs': 'chiffres',
          'Un melange des deux': 'melange',
          'Je ne sais pas': 'incertain',
        };

        const notifMap = {
          'Oui, pour me rappeler de noter mes depenses': 'rappel_saisie',
          'Oui, si j\'approche de ma limite de budget': 'approche_limite',
          'Oui, les deux': 'les_deux',
          'Non, pas de notifications': 'aucune',
        };

        const confMap = {
          'Non, c\'est juste pour moi': 'juste_pour_moi',
          'Peut-etre, avec mon conjoint ou une personne de confiance': 'partage_possible',
          'Je ne sais pas encore': 'incertain',
        };

        return {
          metadata: { version: '1.0', date_completed: now, duration_minutes: duration },
          portrait: {
            revenu_mensuel_net: revenuMap[answers.revenu] || answers.revenu,
            stabilite_revenu: stabiliteMap[answers.stabilite] || answers.stabilite,
            logement: logementMap[answers.logement] || answers.logement,
          },
          depenses_fixes: {
            items: fixedItems,
            total_mensuel: fixedTotal,
            notes: answers.depenses_fixes_notes || '',
          },
          dettes: {
            nombre: debtCount,
            items: debtItems,
            sentiment: answers.sentiment_dettes
              ? (sentimentMap[answers.sentiment_dettes] || (answers.sentiment_dettes === 'Autre' ? answers.sentiment_dettes_autre : answers.sentiment_dettes))
              : null,
          },
          depenses_variables: {
            items: variableItems,
            declencheurs: [
              ...answers.declencheurs.map(d => declSlugMap[d] || d),
              ...(answers.declencheurs_autre ? [answers.declencheurs_autre] : []),
            ],
          },
          habitudes: {
            suivi_actuel: suiviMap[answers.suivi_actuel] || (answers.suivi_actuel === 'Autre' ? answers.suivi_actuel_autre : answers.suivi_actuel),
            app_utilisee: answers.suivi_actuel === "J'utilise une app" ? answers.app_details : null,
            budget_tente: budgetMap[answers.budget_tente] || answers.budget_tente,
            raisons_echec: [
              ...answers.raisons_echec.map(r => r.toLowerCase().replace(/ /g, '_').replace(/'/g, '').replace(/é/g, 'e')),
              ...(answers.raisons_echec_autre ? [answers.raisons_echec_autre] : []),
            ],
          },
          motivation: {
            objectif_libre: answers.objectif_libre || '',
            priorite: prioriteMap[answers.priorite] || (answers.priorite === 'Autre' ? answers.priorite_autre : answers.priorite),
            horizon: horizonMap[answers.horizon] || answers.horizon,
          },
          preferences_usage: {
            frequence_saisie: freqMap[answers.frequence_saisie] || answers.frequence_saisie,
            affichage: affMap[answers.affichage] || answers.affichage,
            notifications: notifMap[answers.notifications] || answers.notifications,
            confidentialite: confMap[answers.confidentialite] || answers.confidentialite,
          },
          question_ouverte: answers.question_ouverte_skip ? '' : (answers.question_ouverte || ''),
        };
      };

      const buildMarkdown = () => {
        const j = buildJSON();
        const dur = j.metadata.duration_minutes;
        const dateStr = new Date().toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' });

        let md = `# Evaluation des besoins financiers\n**Date :** ${dateStr} | **Duree :** ${dur} minutes\n\n`;

        md += `## Portrait de base\n`;
        md += `- Revenu net mensuel : ${answers.revenu || 'Non repondu'}\n`;
        md += `- Stabilite : ${answers.stabilite || 'Non repondu'}\n`;
        md += `- Logement : ${answers.logement || 'Non repondu'}\n\n`;

        md += `## Depenses fixes (total : ${fixedTotal}$/mois)\n`;
        if (j.depenses_fixes.items.length) {
          md += `| Categorie | Montant |\n|---|---|\n`;
          j.depenses_fixes.items.forEach(i => {
            md += `| ${i.categorie.replace(/_/g, ' ')} | ${i.montant_mensuel}$ |\n`;
          });
        } else {
          md += `Aucune depense fixe saisie.\n`;
        }
        if (j.depenses_fixes.notes) md += `\nNotes : ${j.depenses_fixes.notes}\n`;
        md += '\n';

        md += `## Dettes (${j.dettes.nombre})\n`;
        if (j.dettes.items.length) {
          j.dettes.items.forEach((d, i) => {
            md += `### Dette ${i + 1}\n`;
            md += `- Type : ${d.type || 'Non precise'}\n`;
            md += `- Solde : ${d.solde ? d.solde + '$' : 'Non precise'}\n`;
            md += `- Paiement minimum : ${d.paiement_minimum ? d.paiement_minimum + '$/mois' : 'Non precise'}\n`;
            md += `- Taux d'interet : ${d.taux_interet ? d.taux_interet + '%' : 'Inconnu'}\n`;
          });
        } else {
          md += `Aucune dette.\n`;
        }
        if (j.dettes.sentiment) md += `\nSentiment : ${j.dettes.sentiment}\n`;
        md += '\n';

        md += `## Depenses variables\n`;
        if (j.depenses_variables.items.length) {
          j.depenses_variables.items.forEach(i => {
            md += `- ${i.categorie.replace(/_/g, ' ')} : ${i.fourchette}\n`;
          });
        }
        if (j.depenses_variables.declencheurs.length) {
          md += `\n**Declencheurs de depenses :** ${j.depenses_variables.declencheurs.join(', ')}\n`;
        }
        md += '\n';

        md += `## Habitudes actuelles\n`;
        md += `- Suivi : ${j.habitudes.suivi_actuel || 'Non repondu'}\n`;
        if (j.habitudes.app_utilisee) md += `- App utilisee : ${j.habitudes.app_utilisee}\n`;
        md += `- Budget tente : ${j.habitudes.budget_tente || 'Non repondu'}\n`;
        if (j.habitudes.raisons_echec.length) {
          md += `- Raisons d'echec : ${j.habitudes.raisons_echec.join(', ')}\n`;
        }
        md += '\n';

        md += `## Motivation\n`;
        md += `- Objectif : ${j.motivation.objectif_libre || 'Non repondu'}\n`;
        md += `- Priorite #1 : ${j.motivation.priorite || 'Non repondu'}\n`;
        md += `- Horizon : ${j.motivation.horizon || 'Non repondu'}\n\n`;

        md += `## Preferences d'usage\n`;
        md += `- Frequence de saisie : ${j.preferences_usage.frequence_saisie || 'Non repondu'}\n`;
        md += `- Affichage prefere : ${j.preferences_usage.affichage || 'Non repondu'}\n`;
        md += `- Notifications : ${j.preferences_usage.notifications || 'Non repondu'}\n`;
        md += `- Confidentialite : ${j.preferences_usage.confidentialite || 'Non repondu'}\n\n`;

        if (j.question_ouverte) {
          md += `## Question ouverte\n${j.question_ouverte}\n`;
        }

        return md;
      };

      const downloadFile = (content, filename, type) => {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };

      const handleExport = () => {
        downloadFile(JSON.stringify(buildJSON(), null, 2), 'evaluation-financiere.json', 'application/json');

          setCopyMsg('Copie!');

          setCopyMsg('Erreur de copie');

      // ─── Step Renderers ────────────────────────────────────────

                  )}
                  <button type="button"
                    onClick={() => { set('question_ouverte_skip', !answers.question_ouverte_skip); if (!answers.question_ouverte_skip) set('question_ouverte', ''); }}
                    className={`mt-3 px-4 py-2.5 rounded-xl border-2 text-sm min-h-[44px] transition-colors
                      ${answers.question_ouverte_skip ? 'border-ocean-500 bg-ocean-50 text-ocean-700' : 'border-slate-200 text-slate-500'}`}>
                    Non, c'est complet
                  </button>
                </Question>
                <NavButtons onBack={goBack} onNext={goNext} nextLabel="Terminer" />
              </div>
            );

          // ── End Screen ──
          case 26:
            return (
              <div className="fade-in text-center">
                <div className="w-16 h-16 bg-calm-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <svg className="w-8 h-8 text-calm-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                </div>
                <p className="text-slate-700 text-lg leading-relaxed mb-8">
                  Merci! T'as fait le tour. Toutes tes reponses sont pretes a etre exportees. Rien n'a ete envoye nulle part — tout est encore juste sur ton telephone.
                </p>

                <div className="space-y-3">
                  <button onClick={handleExport}
                    className="w-full px-6 py-4 bg-ocean-600 text-white rounded-2xl text-lg font-medium active:bg-ocean-700 min-h-[44px]">
                    Exporter mes reponses
                  </button>

                  <button onClick={handleCopy}
                    className="w-full px-6 py-3.5 border-2 border-ocean-200 text-ocean-700 rounded-2xl text-base font-medium active:bg-ocean-50 min-h-[44px]">
                    {copyMsg || 'Copier dans le presse-papier'}
                  </button>

                  <button onClick={() => setStep(1)}
                    className="w-full px-6 py-3.5 text-slate-500 rounded-2xl text-base active:bg-slate-100 min-h-[44px]">
                    Revoir mes reponses
                  </button>
                </div>
              </div>
            );

          default:
            return null;
        }
      };

      return (
        <div ref={containerRef} className="max-w-lg mx-auto min-h-screen flex flex-col">
          {currentBlock >= 1 && currentBlock <= 8 && (
            <ProgressBar current={currentBlock} total={TOTAL_BLOCKS} />
          )}
          <div className="flex-1 px-5 py-6">
            {renderStep()}
          </div>
          <div className="px-5 pb-4 text-center">
            <p className="text-xs text-slate-300">Tes donnees restent sur ton appareil</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
