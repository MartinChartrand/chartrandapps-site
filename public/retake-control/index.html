<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Questionnaire — Reprendre le controle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            calm: { 50: '#f0fdf4', 100: '#dcfce7', 600: '#16a34a' },
            ocean: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b' }
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useMemo, useEffect } = React;

    // ─── Reusable Components ───────────────────────────────────────
    function ProgressBar({ current, total }) {
      const pct = Math.round((current / total) * 100);
      return (
        <div className="sticky top-0 z-10 bg-white/90 backdrop-blur-sm border-b border-slate-200 px-4 py-3">
          <div className="flex justify-between items-center mb-1.5">
            <span className="text-sm font-medium text-slate-600">{`Etape ${current} de ${total}`}</span>
            <span className="text-sm text-slate-400">{pct}%</span>
          </div>
          <div className="w-full bg-slate-200 rounded-full h-2">
            <div className="bg-ocean-500 h-2 rounded-full transition-all duration-500 ease-out" style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function Intro({ text }) {
      return <p className="text-slate-600 text-base leading-relaxed mb-6 italic">{text}</p>;
    }

    function Q({ text, note, children }) {
      return (
        <div className="mb-5">
          <p className="text-slate-800 text-lg font-medium leading-snug mb-4">{text}</p>
          {note && <p className="text-slate-500 text-sm mb-3">{note}</p>}
          {children}
        </div>
      );
    }

    function Scenario({ text, question, children }) {
      return (
        <div className="mb-5">
          <div className="bg-white border-2 border-slate-200 rounded-2xl p-4 mb-4">
            <p className="text-slate-700 text-base leading-relaxed italic">{text}</p>
          </div>
          <p className="text-slate-800 text-lg font-medium leading-snug mb-4">{question}</p>
          {children}
        </div>
      );
    }

    function Chip({ label, selected, onClick }) {
      return (
        <button type="button" onClick={onClick}
          className={`w-full text-left px-4 py-3.5 rounded-xl border-2 text-base transition-all duration-150 min-h-[44px]
            ${selected ? 'border-ocean-500 bg-ocean-50 text-ocean-700 font-medium' : 'border-slate-200 bg-white text-slate-700 active:bg-slate-50'}`}>
          {label}
        </button>
      );
    }

    function ChipGroup({ options, value, onChange }) {
      return (
        <div className="flex flex-col gap-2.5">
          {options.map(opt => <Chip key={opt} label={opt} selected={value === opt} onClick={() => onChange(opt)} />)}
        </div>
      );
    }

    function MultiChipGroup({ options, values = [], onChange, max }) {
      const toggle = (opt) => {
        if (values.includes(opt)) { onChange(values.filter(v => v !== opt)); return; }
        if (max && values.length >= max) return;
        onChange([...values, opt]);
      };
      return (
        <div className="flex flex-col gap-2.5">
          {options.map(opt => <Chip key={opt} label={opt} selected={values.includes(opt)} onClick={() => toggle(opt)} />)}
          {max && <p className="text-slate-400 text-xs text-right">Maximum {max} choix</p>}
        </div>
      );
    }

    function TextInput({ value, onChange, placeholder, multiline }) {
      const cls = "w-full px-4 py-3 rounded-xl border-2 border-slate-200 text-base text-slate-800 placeholder-slate-400 focus:border-ocean-500 focus:outline-none transition-colors bg-white min-h-[44px]";
      if (multiline) return <textarea className={cls + " min-h-[120px] resize-y"} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} />;
      return <input type="text" className={cls} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} />;
    }

    function Nav({ onBack, onNext, nextLabel }) {
      return (
        <div className="flex gap-3 mt-8">
          {onBack && (
            <button type="button" onClick={onBack}
              className="flex-1 px-4 py-3.5 rounded-xl border-2 border-slate-200 text-slate-600 font-medium text-base bg-white active:bg-slate-50 min-h-[44px]">
              Retour
            </button>
          )}
          <button type="button" onClick={onNext}
            className="flex-1 px-4 py-3.5 rounded-xl font-medium text-base min-h-[44px] bg-ocean-600 text-white active:bg-ocean-700 transition-colors">
            {nextLabel || 'Continuer'}
          </button>
        </div>
      );
    }

    // ─── Main App ──────────────────────────────────────────────────
    function App() {
      const startTime = useRef(Date.now());
      const [step, setStep] = useState(0);
      const [a, setA] = useState({
        // Axe 1
        q1_1: null, q1_1_autre: '',
        q1_2: null,
        q1_3: null,
        q1_4: null,
        // Axe 2
        q2_1: null,
        q2_2: [], // multi max 3
        q2_3: null, q2_3_autre: '',
        q2_4: null, q2_4_autre: '',
        // Axe 3
        q3_1: null,
        q3_2: [], // multi max 3
        q3_3: [], q3_3_autre: '',
        q3_4: null,
        // Axe 4
        q4_1: null,
        q4_2: [], q4_2_autre: '',
        q4_3: [], q4_3_autre: '',
        q4_4: '', q4_4_skip: false,
        // Axe 5
        q5_1: null, q5_1_autre: '',
        q5_2: null,
        q5_3: null,
        // Axe 6
        q6_1: null, q6_2: null, q6_3: null, q6_4: null,
        q6_5: null, q6_6: null, q6_7: null, q6_8: null,
        // Axe 7
        q7_1: [], // multi max 3
        q7_2: '', q7_2_skip: false,
        // Axe 8
        q8_1: null, q8_2: null, q8_3: null,
        q8_4: [], // multi
        q8_5: null,
      });

      const [copyMsg, setCopyMsg] = useState('');

      const set = useCallback((key, val) => setA(prev => ({ ...prev, [key]: val })), []);

      useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [step]);

      // ─── Step mapping ──────────────────────────────────────────
      // 0: Welcome
      // 1-4: Axe 1 (Q1.1-Q1.4)
      // 5-8: Axe 2 (Q2.1-Q2.4)
      // 9-12: Axe 3 (Q3.1-Q3.4)
      // 13-16: Axe 4 (Q4.1-Q4.4, Q4.2+Q4.3 conditional)
      // 17-19: Axe 5 (Q5.1-Q5.3)
      // 20-27: Axe 6 (Q6.1-Q6.8)
      // 28-29: Axe 7 (Q7.1 conditional, Q7.2)
      // 30-34: Axe 8 (Q8.1-Q8.5)
      // 35: End

      const TOTAL_AXES = 8;
      const stepToAxe = (s) => {
        if (s <= 0) return 0;
        if (s <= 4) return 1;
        if (s <= 8) return 2;
        if (s <= 12) return 3;
        if (s <= 16) return 4;
        if (s <= 19) return 5;
        if (s <= 27) return 6;
        if (s <= 29) return 7;
        if (s <= 34) return 8;
        return 9;
      };

      // Positive scenario responses for Q7.1 filtering
      const scenarioKeys = ['q6_1','q6_2','q6_3','q6_4','q6_5','q6_6','q6_7','q6_8'];
      const scenarioLabels = {
        q6_1: 'Savoir combien il me reste a depenser par categorie',
        q6_2: 'Etre avertie quand je depasse',
        q6_3: 'Voir quand mes dettes seront payees',
        q6_4: 'Savoir si je vais manquer d\'argent avant la fin du mois',
        q6_5: 'Avoir un bilan clair chaque mois',
        q6_6: 'Logger mes depenses en quelques secondes',
        q6_7: 'Etre felicitee quand j\'atteins un objectif',
        q6_8: 'Recevoir un resume tranquille de ma journee',
      };
      // Each scenario: first 2 options are "positive"
      const scenarioOptions = {
        q6_1: ['Oui, beaucoup', 'Oui, un peu', 'Pas vraiment', 'Je ne suis pas sure'],
        q6_2: ["Ca m'aiderait a m'arreter", 'Je le verrais mais ca changerait probablement rien', 'Ca me stresserait trop', 'Ca depend de mon humeur'],
        q6_3: ['Oui, beaucoup', 'Oui, un peu', 'Pas vraiment', 'Je ne suis pas sure'],
        q6_4: ['Oui, beaucoup', 'Oui, un peu', 'Pas vraiment', 'Je ne suis pas sure'],
        q6_5: ['Oui, beaucoup', 'Oui, un peu', 'Pas vraiment', 'Je ne suis pas sure'],
        q6_6: ['Oui, a chaque achat', 'Oui, pour les gros achats', 'Peut-etre, si j\'y pense', 'Probablement pas'],
        q6_7: ['Ca me motiverait beaucoup', "C'est un beau bonus mais pas essentiel", "J'ai pas besoin de ca", 'Je ne suis pas sure'],
        q6_8: ["J'aimerais ca, c'est rassurant", 'Utile mais pas tous les soirs', 'Ca me stresserait', "J'aimerais mieux checker moi-meme quand j'en ai envie"],
      };

      const positiveScenarios = useMemo(() => {
        return scenarioKeys.filter(k => {
          const opts = scenarioOptions[k];
          return a[k] === opts[0] || a[k] === opts[1];
        });
      }, [a.q6_1, a.q6_2, a.q6_3, a.q6_4, a.q6_5, a.q6_6, a.q6_7, a.q6_8]);

      const skipQ7_1 = positiveScenarios.length <= 3;

      const shouldShow = (s) => {
        if (s === 14) return a.q4_1 && a.q4_1 !== 'Non, jamais';
        if (s === 15) return a.q4_1 && a.q4_1 !== 'Non, jamais';
        if (s === 28) return !skipQ7_1;
        return true;
      };

      const goNext = () => { let n = step + 1; while (n <= 35 && !shouldShow(n)) n++; setStep(Math.min(n, 35)); };
      const goBack = () => { let n = step - 1; while (n >= 0 && !shouldShow(n)) n--; setStep(Math.max(n, 0)); };

      const currentAxe = stepToAxe(step);

      // ─── Design Signals Generator ────────────────────────────
      const generateDesignSignals = () => {
        // ton_app: Q1.1 + Q1.2 + Q1.3
        let ton = '';
        const emo = a.q1_1;
        if (emo === 'Du stress ou de l\'anxiete') ton = 'Rassurante et normalisante';
        else if (emo === 'De la culpabilite') ton = 'Normalisante, zero jugement, focus sur le progres';
        else if (emo === 'De la confusion — je sais pas trop ou j\'en suis') ton = 'Clarifiante, dashboards simples, metaphores visuelles';
        else if (emo === 'De la frustration — je devrais etre plus avancee') ton = 'Orientee action, objectifs clairs, progression visible';
        else if (emo === 'Pas grand-chose, c\'est correct') ton = 'Utilitaire, moins d\'emotional design';
        else ton = 'A determiner';

        const evitement = a.q1_2;
        if (evitement === 'Oui, souvent — j\'aime mieux pas savoir') ton += ' — evitement eleve, montrer le positif en premier';
        else if (evitement === 'Non, je check tout le temps (peut-etre trop)') ton += ' — check compulsif, calmer plutot qu\'alimenter';

        const tolerance = a.q1_3;
        if (tolerance === 'Ca me motiverait a faire mieux le mois prochain') ton += ', tolerance a la verite elevee';
        else if (tolerance === 'Ca me decouragerait un peu' || tolerance === 'Ca me donnerait le gout de fermer l\'app et de pas y revenir') ton += ', tolerance a la verite faible — reframer en positif';

        // intervention_timing: Q2.1 + Q3.2
        let timing = a.q2_1 || 'Non precise';
        if (a.q3_2.length) timing += ' + declencheurs: ' + a.q3_2.slice(0, 3).join(', ');

        // dashboard_principal: Q7.1 (top 3)
        let dashboard = a.q7_1.length ? a.q7_1.join(' + ') : (positiveScenarios.length <= 3
          ? positiveScenarios.map(k => scenarioLabels[k]).join(' + ')
          : 'A determiner par priorisation');

        // engagement_model: Q8.1 + Q6.7 + Q6.8
        let engagement = a.q8_1 || 'Non precise';
        const q67 = a.q6_7;
        const q68 = a.q6_8;
        if (q67 === 'Ca me motiverait beaucoup' || q67 === "C'est un beau bonus mais pas essentiel") engagement += ', milestones/streaks';
        if (q68 === "J'aimerais ca, c'est rassurant" || q68 === 'Utile mais pas tous les soirs') engagement += ', daily digest';

        // presentation_ecarts: Q1.3
        let ecarts = 'Directe, orientee action';
        if (tolerance === 'Ca me decouragerait un peu') ecarts = 'Reframee en positif — jamais d\'ecart brut';
        else if (tolerance === 'Ca me donnerait le gout de fermer l\'app et de pas y revenir') ecarts = 'Micro-objectifs quotidiens, zero bilan mensuel brutal';
        else if (tolerance === 'Ca m\'informerait — c\'est utile de savoir') ecarts = 'Informative et factuelle';

        // onboarding_urgency: Q4.1 + Q4.3
        let onboarding = 'Standard';
        if (a.q4_1 === 'Oui, plusieurs fois') onboarding = 'Doit livrer du value percu en < 2 minutes — abandonneuse multiple';
        else if (a.q4_1 === 'Oui, une fois') onboarding = 'Value rapide important — une tentative precedente echouee';
        else if (a.q4_1 === 'Non, jamais') onboarding = 'Premiere experience — onboarding pedagogique';
        if (a.q4_3.length) onboarding += '. Raisons abandon: ' + a.q4_3.slice(0, 2).join(', ');

        // automation_level: Q8.3
        let automation = 'Non precise';
        if (a.q8_3 === 'Me laisse tout controler et decider moi-meme') automation = 'Manuel — l\'utilisatrice configure tout';
        else if (a.q8_3 === 'Me suggere des choses mais me laisse le dernier mot') automation = 'Semi-auto — suggestions avec dernier mot';
        else if (a.q8_3 === 'Prend des decisions pour moi le plus possible (ex: allouer les budgets automatiquement)') automation = 'Pilote automatique — budget auto base sur les patterns';

        // privacy_level: Q1.4 + Q8.5
        let privacy = 'Standard';
        if (a.q8_5 === 'Oui, beaucoup — c\'est tres prive') privacy = 'Eleve — Face ID par defaut, pas de montants sur lock screen';
        else if (a.q8_5 === 'Un peu — je prefererais que non') privacy = 'Modere — Face ID optionnel, notifications generiques';
        else if (a.q8_5 === 'Pas vraiment — c\'est pas un secret') privacy = 'Faible — pas de verrou necessaire';
        if (a.q1_4 === 'Pas du tout — personne sait vraiment comment ca va' || a.q1_4 === 'Pas vraiment — c\'est un sujet que j\'evite') privacy += ', zero feature sociale';

        return {
          ton_app: ton,
          intervention_timing: timing,
          dashboard_principal: dashboard,
          engagement_model: engagement,
          presentation_ecarts: ecarts,
          onboarding_urgency: onboarding,
          automation_level: automation,
          privacy_level: privacy,
        };
      };

      // ─── Slugify helper ────────────────────────────────────────
      const slug = (s) => {
        if (!s) return null;
        return s.toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-z0-9]+/g, '_')
          .replace(/^_|_$/g, '');
      };

      // ─── Export builders ───────────────────────────────────────
      const buildJSON = () => {
        const duration = Math.round((Date.now() - startTime.current) / 60000);
        const signals = generateDesignSignals();

        // top 3: if Q7.1 was skipped, use all positives
        const top3 = skipQ7_1
          ? positiveScenarios.map(k => scenarioLabels[k])
          : a.q7_1;

        const scenarioFeatures = {
          q6_1: { key: 'budget_enveloppes_temps_reel', feature: 'Budget par enveloppes avec solde temps reel' },
          q6_2: { key: 'alerte_depassement', feature: 'Notifications de depassement d\'enveloppe' },
          q6_3: { key: 'projection_dette', feature: 'Projection snowball/avalanche avec timeline' },
          q6_4: { key: 'forecast_fin_de_mois', feature: 'Cash flow forecast 30 jours' },
          q6_5: { key: 'bilan_mensuel', feature: 'Rapport mensuel automatique' },
          q6_6: { key: 'saisie_rapide', feature: 'Interface de saisie 2 taps' },
          q6_7: { key: 'celebration_milestone', feature: 'Milestones + streaks + progress bar' },
          q6_8: { key: 'check_in_soir', feature: 'Daily digest notification' },
        };

        const scenarios = {};
        scenarioKeys.forEach(k => {
          const sf = scenarioFeatures[k];
          scenarios[sf.key] = { reponse: slug(a[k]), feature: sf.feature };
        });

        return {
          metadata: { version: '4.0', type: 'needs_discovery', date_completed: new Date().toISOString(), duration_minutes: duration },
          profil_emotionnel: {
            reflexe_emotionnel: slug(a.q1_1) || (a.q1_1_autre ? a.q1_1_autre : null),
            comportement_evitement: slug(a.q1_2),
            seuil_tolerance_verite: slug(a.q1_3),
            argent_tabou: slug(a.q1_4),
          },
          pain_points: {
            pire_moment_du_mois: slug(a.q2_1),
            depenses_regrettees: a.q2_2.map(slug),
            declencheur_prise_conscience: slug(a.q2_3) || (a.q2_3_autre ? a.q2_3_autre : null),
            peur_principale: slug(a.q2_4) || (a.q2_4_autre ? a.q2_4_autre : null),
          },
          comportements: {
            profil_depense: slug(a.q3_1),
            declencheurs: a.q3_2.map(slug),
            workarounds_actuels: [...a.q3_3.map(slug), ...(a.q3_3_autre ? [a.q3_3_autre] : [])],
            mode_paiement: slug(a.q3_4),
          },
          historique_tentatives: {
            nombre_tentatives: slug(a.q4_1),
            ce_qui_marchait: [...a.q4_2.map(slug), ...(a.q4_2_autre ? [a.q4_2_autre] : [])],
            raisons_abandon: [...a.q4_3.map(slug), ...(a.q4_3_autre ? [a.q4_3_autre] : [])],
            app_de_reve_verbatim: a.q4_4_skip ? '' : (a.q4_4 || ''),
          },
          identite_aspirationnelle: {
            vision_succes: slug(a.q5_1) || (a.q5_1_autre ? a.q5_1_autre : null),
            modele_reference: slug(a.q5_2),
            rapport_au_temps: slug(a.q5_3),
          },
          besoins_identifies: {
            scenarios,
            top_3_priorites: top3,
            besoin_non_couvert: a.q7_2_skip ? '' : (a.q7_2 || ''),
          },
          preferences_interaction: {
            rythme: slug(a.q8_1),
            style_visuel: slug(a.q8_2),
            controle_vs_autopilot: slug(a.q8_3),
            notifications_acceptees: a.q8_4.map(slug),
            confidentialite: slug(a.q8_5),
          },
          design_signals: signals,
        };
      };

      const buildMarkdown = () => {
        const j = buildJSON();
        const dur = j.metadata.duration_minutes;
        const dateStr = new Date().toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' });

        let md = `# Profil de decouverte des besoins — Finance personnelle\n**Date :** ${dateStr} | **Duree :** ${dur} minutes\n\n---\n\n`;

        md += `## Profil emotionnel\n`;
        md += `- Emotion primaire face a l'argent : ${a.q1_1 || 'Non repondu'}${a.q1_1 === 'Autre' && a.q1_1_autre ? ' — ' + a.q1_1_autre : ''}\n`;
        md += `- Comportement d'evitement : ${a.q1_2 || 'Non repondu'}\n`;
        md += `- Tolerance a la confrontation : ${a.q1_3 || 'Non repondu'}\n`;
        md += `- Argent comme sujet social : ${a.q1_4 || 'Non repondu'}\n\n`;

        md += `## Points de douleur\n`;
        md += `- Moment critique du mois : ${a.q2_1 || 'Non repondu'}\n`;
        md += `- Depenses regrettees : ${a.q2_2.length ? a.q2_2.join(', ') : 'Non repondu'}\n`;
        md += `- Declencheur de la prise de conscience : ${a.q2_3 || 'Non repondu'}${a.q2_3 === 'Autre' && a.q2_3_autre ? ' — ' + a.q2_3_autre : ''}\n`;
        md += `- Peur principale : ${a.q2_4 || 'Non repondu'}${a.q2_4 === 'Autre' && a.q2_4_autre ? ' — ' + a.q2_4_autre : ''}\n\n`;

        md += `## Comportements\n`;
        md += `- Profil : ${a.q3_1 || 'Non repondu'}\n`;
        md += `- Declencheurs : ${a.q3_2.length ? a.q3_2.join(', ') : 'Non repondu'}\n`;
        md += `- Workarounds actuels : ${a.q3_3.length ? [...a.q3_3, ...(a.q3_3_autre ? [a.q3_3_autre] : [])].join(', ') : 'Non repondu'}\n`;
        md += `- Mode de paiement principal : ${a.q3_4 || 'Non repondu'}\n\n`;

        md += `## Historique des tentatives\n`;
        md += `- Nombre : ${a.q4_1 || 'Non repondu'}\n`;
        if (a.q4_1 && a.q4_1 !== 'Non, jamais') {
          md += `- Ce qui avait marche : ${a.q4_2.length ? [...a.q4_2, ...(a.q4_2_autre ? [a.q4_2_autre] : [])].join(', ') : 'Non repondu'}\n`;
          md += `- Raisons d'abandon : ${a.q4_3.length ? [...a.q4_3, ...(a.q4_3_autre ? [a.q4_3_autre] : [])].join(', ') : 'Non repondu'}\n`;
        }
        md += `- App de reve (verbatim) : "${a.q4_4_skip ? '' : (a.q4_4 || '')}"\n\n`;

        md += `## Identite aspirationnelle\n`;
        md += `- Vision du succes : ${a.q5_1 || 'Non repondu'}${a.q5_1 === 'Autre' && a.q5_1_autre ? ' — ' + a.q5_1_autre : ''}\n`;
        md += `- Modele de reference : ${a.q5_2 || 'Non repondu'}\n`;
        md += `- Rapport au temps : ${a.q5_3 || 'Non repondu'}\n\n`;

        md += `## Besoins identifies (scenarios)\n`;
        md += `| Scenario | Interet | Feature technique |\n|---|---|---|\n`;

                  text="A 21h, ton telephone t'envoie un petit message : 'Ta journee de depenses : 47$. Il te reste 312$ pour la semaine. Bonne soiree.' Pas une alarme — juste un resume tranquille."
                  question="Comment tu trouverais ca?">
                  <ChipGroup options={scenarioOptions.q6_8} value={a.q6_8} onChange={v => set('q6_8', v)} />
                </Scenario>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          // ── Axe 7: Priorisation ──
          case 28: // conditional — only if > 3 positive scenarios
            return (
              <div className="fade-in">
                <Intro text="T'as vu plusieurs idees. Si tu devais choisir les 3 qui t'aideraient le plus au quotidien, lesquelles tu prendrais?" />
                <Q text="Choisis les 3 qui changeraient le plus ta vie." note="Maximum 3 choix.">
                  <MultiChipGroup max={3}
                    options={positiveScenarios.map(k => scenarioLabels[k])}
                    values={a.q7_1}
                    onChange={v => set('q7_1', v)}
                  />
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          case 29:
            return (
              <div className="fade-in">
                {skipQ7_1 && <Intro text="T'as vu plusieurs idees. Une derniere question la-dessus." />}
                <Q text="Est-ce qu'il y a quelque chose que t'aimerais qu'un outil fasse et qu'on n'a pas mentionne?">
                  {!a.q7_2_skip && <TextInput value={a.q7_2} onChange={v => set('q7_2', v)} placeholder="Ecris ici..." multiline />}
                  <button type="button" onClick={() => { set('q7_2_skip', !a.q7_2_skip); if (!a.q7_2_skip) set('q7_2', ''); }}
                    className={`mt-3 px-4 py-2.5 rounded-xl border-2 text-sm min-h-[44px] transition-colors ${a.q7_2_skip ? 'border-ocean-500 bg-ocean-50 text-ocean-700' : 'border-slate-200 text-slate-500'}`}>
                    Non, c'est bon
                  </button>
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          // ── Axe 8: Preferences d'interaction ──
          case 30:
            return (
              <div className="fade-in">
                <Intro text="On est presque a la fin. Juste quelques questions sur comment tu voudrais utiliser un outil comme ca." />
                <Q text="A quelle frequence tu serais prete a interagir avec l'app?">
                  <ChipGroup options={[
                    'Chaque jour, quelques minutes',
                    'Quelques fois par semaine',
                    'Une fois par semaine, pour faire le point',
                    'Le moins possible — juste quand c\'est important'
                  ]} value={a.q8_1} onChange={v => set('q8_1', v)} />
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          case 31:
            return (
              <div className="fade-in">
                <Q text="Tu preferes voir ta situation financiere comment?">
                  <ChipGroup options={[
                    'Des graphiques et des visuels (barres, cercles, couleurs)',
                    'Des chiffres simples et clairs',
                    'Un melange des deux',
                    'Juste un feu de circulation — vert, jaune, rouge'
                  ]} value={a.q8_2} onChange={v => set('q8_2', v)} />
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          case 32:
            return (
              <div className="fade-in">
                <Q text="Tu prefererais une app qui...">
                  <ChipGroup options={[
                    'Me laisse tout controler et decider moi-meme',
                    'Me suggere des choses mais me laisse le dernier mot',
                    'Prend des decisions pour moi le plus possible (ex: allouer les budgets automatiquement)'
                  ]} value={a.q8_3} onChange={v => set('q8_3', v)} />
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          case 33:
            return (
              <div className="fade-in">
                <Q text="Quel genre de notifications tu accepterais?" note="Tu peux en choisir plusieurs.">
                  <MultiChipGroup options={[
                    'Me rappeler de noter mes depenses',
                    'M\'avertir si je depasse un budget',
                    'Me donner un resume quotidien',
                    'Me feliciter quand ca va bien',
                    'Aucune — je veux ouvrir l\'app quand je veux'
                  ]} values={a.q8_4} onChange={v => set('q8_4', v)} />
                </Q>
                <Nav onBack={goBack} onNext={goNext} />
              </div>
            );

          case 34:
            return (
              <div className="fade-in">
                <Q text="Si quelqu'un prenait ton telephone, est-ce que ca te derangerait qu'il voie l'app?">
                  <ChipGroup options={[
                    'Oui, beaucoup — c\'est tres prive',
                    'Un peu — je prefererais que non',
                    'Pas vraiment — c\'est pas un secret'
                  ]} value={a.q8_5} onChange={v => set('q8_5', v)} />
                </Q>
                <Nav onBack={goBack} onNext={goNext} nextLabel="Terminer" />
              </div>
            );

          // ── End ──
          case 35:
            return (
              <div className="fade-in text-center">
                <div className="w-16 h-16 bg-calm-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <svg className="w-8 h-8 text-calm-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                </div>
                <p className="text-slate-700 text-lg leading-relaxed mb-8">
                  Merci! Tes reponses vont vraiment aider a batir un outil qui fait du sens pour le vrai monde. Rien n'a ete envoye — tout est encore sur ton telephone.
                </p>
                <div className="space-y-3">
                  <button onClick={handleExport} className="w-full px-6 py-4 bg-ocean-600 text-white rounded-2xl text-lg font-medium active:bg-ocean-700 min-h-[44px]">Exporter mes reponses</button>
                  <button onClick={handleCopy} className="w-full px-6 py-3.5 border-2 border-ocean-200 text-ocean-700 rounded-2xl text-base font-medium active:bg-ocean-50 min-h-[44px]">{copyMsg || 'Copier dans le presse-papier'}</button>
                  <button onClick={() => setStep(1)} className="w-full px-6 py-3.5 text-slate-500 rounded-2xl text-base active:bg-slate-100 min-h-[44px]">Revoir mes reponses</button>
                </div>
              </div>
            );

          default: return null;
        }
      };

      return (
        <div className="max-w-lg mx-auto min-h-screen flex flex-col">
          {currentAxe >= 1 && currentAxe <= 8 && <ProgressBar current={currentAxe} total={TOTAL_AXES} />}
          <div className="flex-1 px-5 py-6">{renderStep()}</div>
          <div className="px-5 pb-4 text-center"><p className="text-xs text-slate-300">Tes donnees restent sur ton appareil</p></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
