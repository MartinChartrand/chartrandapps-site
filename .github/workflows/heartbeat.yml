name: Heartbeat

# Pacemaker mensuel (ARCHITECTURE §7) : commit horodaté → repo actif (règle 60 j + dépublication
# Pages) ET redéclenche deploy.yml. Pas de [skip ci] : le rebuild est voulu. Ne modifie QUE heartbeat.txt.
on:
  schedule:
    - cron: "17 6 1 * *" # 1er de chaque mois, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Stamp heartbeat
        run: |
          mkdir -p reports
          date -u +"%Y-%m-%dT%H:%M:%SZ heartbeat" > reports/heartbeat.txt
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/heartbeat.txt
          git commit -m "chore(heartbeat): pacemaker $(date -u +%Y-%m)" || echo "rien à committer"
          git push
